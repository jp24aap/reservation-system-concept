<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservation - Maid Café ✨</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="database.js"></script>
    <script src="reservation.js"></script>
</head>
<body>
    <header>
        <div class="back-button" onclick="window.location.href='index.html'">
            <span class="back-arrow">←</span>
            <span class="back-text">Home</span>
        </div>
    </header>

    <main class="reservation-page">
        <h2>✧ Make a Reservation ✧</h2>

        <div class="reservation-container">
            <form class="reservation-form" id="reservationForm">
                <div class="form-group">
                    <label>Name ♡</label>
                    <input type="text" name="name" id="name" required placeholder="Your name...">
                </div>

                <div class="form-group">
                    <label>Email ♡</label>
                    <input type="email" name="email" id="email" required placeholder="your.email@example.com">
                </div>

                <div class="form-group">
                    <label>Date ♡</label>
                    <input type="date" name="date" id="date" required>
                </div>

                <div class="form-group">
                    <label>Time ♡</label>
                    <input type="time" name="time" id="time" required>
                </div>

                <div class="form-group">
                    <label>Party Size ♡</label>
                    <select name="partySize" id="partySize" required>
                        <option value="1">1 Person</option>
                        <option value="2">2 People</option>
                        <option value="3">3 People</option>
                        <option value="4">4 People</option>
                        <option value="5+">5+ People</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Special Requests ♡</label>
                    <textarea name="requests" id="requests" placeholder="Any special requests..."></textarea>
                </div>

                <button type="submit" class="submit-btn">Make Reservation ✧</button>
            </form>
        </div>
    </main>
</body>
</html>
