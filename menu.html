<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Maid Café ✨</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="ai-assistant" id="aiAssistant">
        <!-- AI Assistant remains same as index.html -->
    </div>

    <header>
        <!-- Header remains same as index.html -->
    </header>

    <div class="back-button" onclick="window.location.href='index.html'">
        <span class="back-arrow">←</span>
        <span class="back-text">Home</span>
    </div>

    <main class="menu-page">
        <h2>✧ Our Delightful Menu ✧</h2>
        
        <section class="menu-category">
            <h3>✿ Main Dishes ✿</h3>
            <div class="menu-grid">
                <div class="menu-item">
                    <img src="assests/menu/omurice.jpg" alt="Omurice">
                    <h4>Omurice</h4>
                    <p class="description">Fluffy omelette filled with fried rice and topped with cute ketchup art!</p>
                    <p class="price">$12.99</p>
                    <button class="order-btn">Order Now ♡</button>
                </div>
                <div class="menu-item">
                    <img src="assets/menu/curry.jpg" alt="Curry Rice">
                    <h4>Curry Rice</h4>
                    <p class="description">Homemade Japanese curry with tender chicken and vegetables</p>
                    <p class="price">$14.99</p>
                    <button class="order-btn">Order Now ♡</button>
                </div>
                <!-- More main dishes -->
            </div>
        </section>

        <section class="menu-category">
            <h3>✿ Desserts ✿</h3>
            <div class="menu-grid">
                <!-- Dessert items -->
            </div>
        </section>

        <section class="menu-category">
            <h3>✿ Drinks ✿</h3>
            <div class="menu-grid">
                <!-- Drink items -->
            </div>
        </section>
    </main>
