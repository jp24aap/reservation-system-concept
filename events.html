<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - Maid Café ✨</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="back-button" onclick="window.location.href='index.html'">
            <span class="back-arrow">←</span>
            <span class="back-text">Home</span>
        </div>
    </header>

    <main class="events-page">
        <h2>✧ Upcoming Events ✧</h2>

        <div class="events-grid">
            <div class="event-card">
                <img src="assets/events/cosplay-day.jpg" alt="Cosplay Day">
                <div class="event-info">
                    <h3>Special Cosplay Day</h3>
                    <p class="date">✧ Saturday, July 15th ✧</p>
                    <p class="description">Join us for a magical day where our maids dress up as your favorite anime characters!</p>
                    <button class="rsvp-btn">RSVP Now ♡</button>
                </div>
            </div>

            <div class="event-card">
                <img src="assets/events/tea-party.jpg" alt="Royal Tea Party">
                <div class="event-info">
                    <h3>Royal Tea Party</h3>
                    <p class="date">✧ Sunday, July 23rd ✧</p>
                    <p class="description">Experience our premium tea selection with handmade sweets!</p>
                    <button class="rsvp-btn">RSVP Now ♡</button>
                </div>
            </div>
            <!-- More event cards -->
        </div>
    </main>
</body>
</html>
