<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Page Not Found - Sweet Dreams Maid Café</title>
    <link rel="stylesheet" href="styles.css">
    <script src="database.js"></script>
</head>
<body>
    <!-- Fake 404 page -->
    <div id="fake404" class="error-page">
        <div class="error-container">
            <h1>404</h1>
            <h2>Page Not Found</h2>
            <p>Oops! The page you are looking for doesn't exist.</p>
            <a href="index.html" class="home-link">Return to Home</a>
        </div>
    </div>

    <!-- Login screen (hidden initially) -->
    <div id="loginScreen" class="login-screen" style="display: none;">
        <div class="login-container">
            <h1>✧ Admin Login ✧</h1>
            <div class="login-form">
                <input type="password" id="adminPassword" placeholder="Enter admin password">
                <button onclick="checkPassword()">Login</button>
                <p id="loginError" class="error-message"></p>
            </div>
        </div>
    </div>

    <!-- Admin panel (hidden initially) -->
    <div id="adminPanel" class="admin-panel" style="display: none;">
        <h1>✧ Admin Panel ✧</h1>
        
        <div class="admin-controls">
            <button onclick="logout()" class="logout-btn">Logout</button>
        </div>
        
        <div class="search-section">
            <input type="text" id="searchInput" placeholder="Search reservations or orders...">
            <button onclick="searchData()">Search</button>
        </div>

        <div class="data-section">
            <h2>Reservations</h2>
            <div class="data-container" id="reservationsContainer"></div>
            
            <h2>Orders</h2>
            <div class="data-container" id="ordersContainer"></div>
        </div>
        
        <div class="export-section">
            <button onclick="exportData()">Export All Data</button>
        </div>
    </div>

    <script>
        // Force logout on initial load to ensure 404 page shows
        sessionStorage.removeItem('adminLoggedIn');
        
        // Admin password - change this to your preferred password
        const ADMIN_PASSWORD = "maidcafe2023";
        
        // Secret key combination to reveal login - using Control key
        document.addEventListener('keydown', function(e) {
            // Log key press for debugging
            console.log('Key pressed:', e.key, 'Control:', e.ctrlKey, 'Option/Alt:', e.altKey);
            
            // For MacBook: Control+Option+M
            if (e.ctrlKey && e.altKey && e.key.toLowerCase() === 'm') {
                console.log('Secret combination detected!');
                document.getElementById('fake404').style.display = 'none';
                document.getElementById('loginScreen').style.display = 'flex';
            }
        });
        
        // Check if already logged in
        function checkLoggedIn() {
            const isLoggedIn = sessionStorage.getItem('adminLoggedIn');
            if (isLoggedIn === 'true') {
                document.getElementById('fake404').style.display = 'none';
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                // Initialize data display
                displayReservations();
                displayOrders();
            }
        }
        
        // Check password
        function checkPassword() {
            const password = document.getElementById('adminPassword').value;
            if (password === ADMIN_PASSWORD) {
                // Store login state in session storage
                sessionStorage.setItem('adminLoggedIn', 'true');
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                // Initialize data display
                displayReservations();
                displayOrders();
            } else {
                document.getElementById('loginError').textContent = 'Incorrect password';
            }
        }
        
        // Logout function
        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            // Show the fake 404 page instead of login screen when logging out
            document.getElementById('fake404').style.display = 'flex';
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminPassword').value = '';
            document.getElementById('loginError').textContent = '';
        }
        
        // Initialize database manager
        const db = new DatabaseManager();
        
        function displayReservations() {
            const reservations = db.getReservations();
            const container = document.getElementById('reservationsContainer');
            container.innerHTML = '';
            
            if (reservations.length === 0) {
                container.innerHTML = '<p class="no-data">No reservations found</p>';
                return;
            }
            
            reservations.forEach(res => {
                const card = document.createElement('div');
                card.className = 'data-card';
                card.innerHTML = `
                    <h3>${res.name}</h3>
                    <p><strong>Email:</strong> ${res.email}</p>
                    <p><strong>Date:</strong> ${new Date(res.date).toLocaleDateString()}</p>
                    <p><strong>Time:</strong> ${res.time}</p>
                    <p><strong>Party Size:</strong> ${res.partySize}</p>
                    <p><strong>Special Requests:</strong> ${res.requests || 'None'}</p>
                    <p><strong>Reserved on:</strong> ${new Date(res.timestamp).toLocaleString()}</p>
                    <div class="card-actions">
                        <button onclick="editReservation(${res.id})" class="edit-btn">Edit</button>
                        <button onclick="deleteReservation(${res.id})" class="delete-btn">Delete</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }
        
        function displayOrders() {
            const orders = db.getOrders();
            const container = document.getElementById('ordersContainer');
            container.innerHTML = '';
            
            if (orders.length === 0) {
                container.innerHTML = '<p class="no-data">No orders found</p>';
                return;
            }
            
            orders.forEach(order => {
                const card = document.createElement('div');
                card.className = 'data-card';
                
                let itemsHtml = '';
                order.items.forEach(item => {
                    itemsHtml += `<li>${item.name} - $${item.price}</li>`;
                });
                
                card.innerHTML = `
                    <h3>Order #${order.id}</h3>
                    <p><strong>Date:</strong> ${new Date(order.timestamp).toLocaleString()}</p>
                    <p><strong>Status:</strong> ${order.status}</p>
                    <h4>Items:</h4>
                    <ul>${itemsHtml}</ul>
                    <p><strong>Total:</strong> $${order.total.toFixed(2)}</p>
                `;
                container.appendChild(card);
            });
        }
        
        function searchData() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) {
                displayReservations();
                displayOrders();
                return;
            }
            
            const reservations = db.searchReservations(query);
            const orders = db.searchOrders(query);
            
            const resContainer = document.getElementById('reservationsContainer');
            const ordersContainer = document.getElementById('ordersContainer');
            
            resContainer.innerHTML = '';
            ordersContainer.innerHTML = '';
            
            if (reservations.length === 0) {
                resContainer.innerHTML = '<p class="no-data">No matching reservations found</p>';
            } else {
                reservations.forEach(res => {
                    const card = document.createElement('div');
                    card.className = 'data-card';
                    card.innerHTML = `
                        <h3>${res.name}</h3>
                        <p><strong>Email:</strong> ${res.email}</p>
                        <p><strong>Date:</strong> ${new Date(res.date).toLocaleDateString()}</p>
                        <p><strong>Time:</strong> ${res.time}</p>
                        <p><strong>Party Size:</strong> ${res.partySize}</p>
                        <p><strong>Special Requests:</strong> ${res.requests || 'None'}</p>
                        <p><strong>Reserved on:</strong> ${new Date(res.timestamp).toLocaleString()}</p>
                    `;
                    resContainer.appendChild(card);
                });
            }
            
            if (orders.length === 0) {
                ordersContainer.innerHTML = '<p class="no-data">No matching orders found</p>';
            } else {
                orders.forEach(order => {
                    const card = document.createElement('div');
                    card.className = 'data-card';
                    
                    let itemsHtml = '';
                    order.items.forEach(item => {
                        itemsHtml += `<li>${item.name} - $${item.price}</li>`;
                    });
                    
                    card.innerHTML = `
                        <h3>Order #${order.id}</h3>
                        <p><strong>Date:</strong> ${new Date(order.timestamp).toLocaleString()}</p>
                        <p><strong>Status:</strong> ${order.status}</p>
                        <h4>Items:</h4>
                        <ul>${itemsHtml}</ul>
                        <p><strong>Total:</strong> $${order.total.toFixed(2)}</p>
                    `;
                    ordersContainer.appendChild(card);
                });
            }
        }
        
        function exportData() {
            const data = db.exportData();
            const dataStr = JSON.stringify(data, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
            
            const exportFileDefaultName = 'maid-cafe-data.json';
            
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();
        }
        
        // Check login status when page loads - after a slight delay to ensure 404 shows first
        window.onload = function() {
            // Force display of 404 page initially
            document.getElementById('fake404').style.display = 'flex';
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'none';
            
            // Then check if user is logged in after a brief moment
            setTimeout(checkLoggedIn, 100);
        };

        // Add these new functions for handling reservations
        function editReservation(id) {
            const reservation = db.getReservationById(id);
            if (!reservation) return;

            // Create edit form modal
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h2>Edit Reservation</h2>
                    <form id="editReservationForm">
                        <div class="form-group">
                            <label>Name:</label>
                            <input type="text" name="name" value="${reservation.name}" required>
                        </div>
                        <div class="form-group">
                            <label>Email:</label>
                            <input type="email" name="email" value="${reservation.email}" required>
                        </div>
                        <div class="form-group">
                            <label>Date:</label>
                            <input type="date" name="date" value="${reservation.date}" required>
                        </div>
                        <div class="form-group">
                            <label>Time:</label>
                            <input type="time" name="time" value="${reservation.time}" required>
                        </div>
                        <div class="form-group">
                            <label>Party Size:</label>
                            <select name="partySize" required>
                                <option value="1" ${reservation.partySize === '1' ? 'selected' : ''}>1 Person</option>
                                <option value="2" ${reservation.partySize === '2' ? 'selected' : ''}>2 People</option>
                                <option value="3" ${reservation.partySize === '3' ? 'selected' : ''}>3 People</option>
                                <option value="4" ${reservation.partySize === '4' ? 'selected' : ''}>4 People</option>
                                <option value="5+" ${reservation.partySize === '5+' ? 'selected' : ''}>5+ People</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Special Requests:</label>
                            <textarea name="requests">${reservation.requests || ''}</textarea>
                        </div>
                        <div class="modal-actions">
                            <button type="submit" class="save-btn">Save Changes</button>
                            <button type="button" class="cancel-btn" onclick="this.closest('.modal').remove()">Cancel</button>
                        </div>
                    </form>
                </div>
            `;

            document.body.appendChild(modal);

            // Handle form submission
            modal.querySelector('form').addEventListener('submit', function(e) {
                e.preventDefault();
                const formData = new FormData(e.target);
                const updatedReservation = {
                    ...reservation,
                    name: formData.get('name'),
                    email: formData.get('email'),
                    date: formData.get('date'),
                    time: formData.get('time'),
                    partySize: formData.get('partySize'),
                    requests: formData.get('requests')
                };
                
                db.updateReservation(id, updatedReservation);
                modal.remove();
                displayReservations();
            });
        }

        function deleteReservation(id) {
            if (confirm('Are you sure you want to delete this reservation?')) {
                db.deleteReservation(id);
                displayReservations();
            }
        }
    </script>
    
    <style>
        /* Fake 404 page styles */
        .error-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            text-align: center;
        }
        
        .error-container {
            max-width: 500px;
            padding: 40px;
        }
        
        .error-page h1 {
            font-size: 120px;
            margin: 0;
            color: #ff6b81;
        }
        
        .error-page h2 {
            font-size: 28px;
            margin: 0 0 20px;
            color: #333;
        }
        
        .error-page p {
            font-size: 18px;
            margin-bottom: 30px;
            color: #555;
        }
        
        .home-link {
            display: inline-block;
            padding: 12px 25px;
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .home-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 10px rgba(255, 107, 129, 0.3);
        }
        
        /* Login screen styles */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 245, 248, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .login-container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(255, 154, 193, 0.3);
            width: 350px;
            text-align: center;
            border: 3px solid var(--primary-color);
        }
        
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }
        
        .login-form input {
            padding: 12px;
            border: 2px solid var(--primary-color);
            border-radius: 25px;
            font-size: 16px;
        }
        
        .login-form button {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .error-message {
            color: #ff4757;
            margin: 5px 0 0;
            font-size: 14px;
        }
        
        /* Logout button */
        .admin-controls {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }
        
        .logout-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .admin-panel {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            font-family: 'Arial', sans-serif;
        }
        
        h1, h2 {
            color: var(--primary-color);
            text-align: center;
        }
        
        .search-section {
            display: flex;
            margin: 20px 0;
            justify-content: center;
        }
        
        #searchInput {
            padding: 10px;
            border: 2px solid var(--primary-color);
            border-radius: 25px 0 0 25px;
            width: 50%;
        }
        
        .search-section button {
            background: var(--primary-color);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 0 25px 25px 0;
            cursor: pointer;
        }
        
        .data-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        
        .data-card {
            background: white;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 4px 10px rgba(255, 154, 193, 0.3);
            border: 2px solid var(--primary-color);
        }
        
        .no-data {
            text-align: center;
            color: gray;
            grid-column: 1 / -1;
        }
        
        .export-section {
            text-align: center;
            margin: 30px 0;
        }
        
        .export-section button {
            background: var(--accent-color);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Card actions */
        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .edit-btn, .delete-btn {
            padding: 8px 15px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .edit-btn {
            background: #4CAF50;
            color: white;
        }

        .delete-btn {
            background: #ff4757;
            color: white;
        }

        .edit-btn:hover, .delete-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* Modal styles */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .modal-content h2 {
            margin-bottom: 20px;
            color: var(--primary-color);
        }

        .modal-content .form-group {
            margin-bottom: 15px;
        }

        .modal-content label {
            display: block;
            margin-bottom: 5px;
            color: #333;
        }

        .modal-content input,
        .modal-content select,
        .modal-content textarea {
            width: 100%;
            padding: 8px;
            border: 2px solid var(--primary-color);
            border-radius: 10px;
            font-size: 14px;
        }

        .modal-content textarea {
            height: 100px;
            resize: vertical;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .save-btn, .cancel-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        .save-btn {
            background: #4CAF50;
            color: white;
        }

        .cancel-btn {
            background: #ff4757;
            color: white;
        }
    </style>
</body>
</html>
